name: Reproduce Kubernetes 139276 Deterministic Collision

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/repro-k8s-139276-deterministic.yml"

jobs:
  repro:
    runs-on: ubuntu-24.04
    timeout-minutes: 75

    permissions:
      contents: read

    steps:
      - name: Show runner environment
        run: |
          set -euxo pipefail
          uname -a
          docker version

      - name: Install kind and kubectl
        run: |
          set -euxo pipefail
          curl -Lo kind https://kind.sigs.k8s.io/dl/v0.25.0/kind-linux-amd64
          chmod +x kind
          sudo mv kind /usr/local/bin/kind
          kind version

          curl -LO "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client=true

      - name: Create IPVS kind cluster with expanded NodePort range
        run: |
          set -euxo pipefail

          cat > kind-ipvs-deterministic.yaml <<'EOF'
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          name: k8s-139276-deterministic
          networking:
            kubeProxyMode: "ipvs"
          kubeadmConfigPatches:
            - |
              kind: ClusterConfiguration
              apiServer:
                extraArgs:
                  service-node-port-range: "30000-60999"
          nodes:
            - role: control-plane
          EOF

          kind delete cluster --name k8s-139276-deterministic || true
          kind create cluster --config kind-ipvs-deterministic.yaml --image kindest/node:v1.31.0

          kubectl cluster-info
          kubectl get nodes -o wide
          kubectl -n kube-system get pods -o wide

      - name: Install node debug tools
        run: |
          set -euxo pipefail
          docker exec k8s-139276-deterministic-control-plane bash -lc '
            apt-get update
            apt-get install -y curl ipvsadm conntrack iptables tcpdump procps iproute2
          '

      - name: Deploy backend and NodePorts
        run: |
          set -euxo pipefail

          cat > app.yaml <<'EOF'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: k8s-139276-echo
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: k8s-139276-echo
            template:
              metadata:
                labels:
                  app: k8s-139276-echo
              spec:
                containers:
                  - name: agnhost
                    image: registry.k8s.io/e2e-test-images/agnhost:2.53
                    args: ["netexec", "--http-port=9397"]
                    ports:
                      - containerPort: 9397
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: k8s-139276-clusterip
          spec:
            type: ClusterIP
            selector:
              app: k8s-139276-echo
            ports:
              - name: http
                port: 9397
                targetPort: 9397
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: np-collision-32770
          spec:
            type: NodePort
            selector:
              app: k8s-139276-echo
            ports:
              - name: p32770
                port: 32770
                targetPort: 9397
                nodePort: 32770
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: np-collision-32771
          spec:
            type: NodePort
            selector:
              app: k8s-139276-echo
            ports:
              - name: p32771
                port: 32771
                targetPort: 9397
                nodePort: 32771
          EOF

          kubectl apply -f app.yaml
          kubectl rollout status deploy/k8s-139276-echo --timeout=180s

          CLUSTER_IP="$(kubectl get svc k8s-139276-clusterip -o jsonpath='{.spec.clusterIP}')"
          echo "$CLUSTER_IP" | tee cluster-ip.txt

          kubectl get pods -o wide
          kubectl get svc -o wide | tee services-initial.txt

          docker exec k8s-139276-deterministic-control-plane bash -lc "curl -v --max-time 5 http://$CLUSTER_IP:9397/hostname"
          docker exec k8s-139276-deterministic-control-plane bash -lc "ipvsadm -Ln" | tee ipvs-initial.txt

      - name: Direct source-port collision test
        run: |
          set -euxo pipefail

          CLUSTER_IP="$(cat cluster-ip.txt)"

          run_curl() {
            label="$1"
            port="$2"

            echo "=== $label local-port=$port ===" | tee -a direct-collision-results.txt

            set +e
            docker exec k8s-139276-deterministic-control-plane bash -lc "curl -sS --local-port $port --connect-timeout 3 --max-time 6 http://$CLUSTER_IP:9397/hostname" \
              > "curl-$label.out" 2> "curl-$label.err"
            rc=$?
            set -e

            echo "rc=$rc" | tee -a direct-collision-results.txt
            echo "stdout:" | tee -a direct-collision-results.txt
            cat "curl-$label.out" | tee -a direct-collision-results.txt || true
            echo "stderr:" | tee -a direct-collision-results.txt
            cat "curl-$label.err" | tee -a direct-collision-results.txt || true

            docker exec k8s-139276-deterministic-control-plane bash -lc "conntrack -L -p tcp 2>/dev/null | grep -E 'SYN_SENT|UNREPLIED|sport=$port|dport=$port' || true" \
              | tee -a direct-collision-conntrack.txt

            sleep 3
          }

          run_curl "collision-nodeport-32770" "32770"
          run_curl "collision-nodeport-32771-before-delete" "32771"

          kubectl delete svc np-collision-32771
          sleep 5
          run_curl "no-nodeport-32771-after-delete" "32771"

          kubectl apply -f app.yaml
          sleep 5
          run_curl "collision-nodeport-32771-after-recreate" "32771"

      - name: Forced ephemeral overlap stress test
        run: |
          set -euxo pipefail

          CLUSTER_IP="$(cat cluster-ip.txt)"

          cat > overlap-nodeports.yaml <<'EOF'
          EOF

          for p in $(seq 32768 32999); do
            if [ "$p" = "32770" ] || [ "$p" = "32771" ]; then
              continue
            fi

            cat >> overlap-nodeports.yaml <<EOF
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: np-overlap-$p
          spec:
            type: NodePort
            selector:
              app: k8s-139276-echo
            ports:
              - name: p$p
                port: $p
                targetPort: 9397
                nodePort: $p
          EOF
          done

          kubectl apply -f overlap-nodeports.yaml
          kubectl get svc | grep NodePort | wc -l | tee nodeport-count.txt

          cat > stress.sh <<EOF
          #!/usr/bin/env bash
          set -u

          URL="http://$CLUSTER_IP:9397/hostname"

          sysctl -w net.ipv4.ip_local_port_range="32768 60999"
          sysctl -w net.ipv4.ip_local_reserved_ports=""

          sysctl net.ipv4.ip_local_port_range
          sysctl net.ipv4.ip_local_reserved_ports || true

          rm -f /tmp/curl-failures.log /tmp/conntrack-overlap.log

          echo "URL=\$URL"
          date

          seq 1 100000 | xargs -n1 -P300 -I{} bash -c '
            if ! curl -sS --connect-timeout 1 --max-time 2 "$0" >/dev/null; then
              echo "curl failed iteration={}" >> /tmp/curl-failures.log
            fi
          ' "\$URL" || true

          date
          echo "failure count:"
          wc -l /tmp/curl-failures.log 2>/dev/null || true

          conntrack -L -p tcp 2>/dev/null | grep -E "SYN_SENT|UNREPLIED|sport=3276[8-9]|sport=327[7-9][0-9]|sport=328[0-9][0-9]|sport=329[0-9][0-9]" > /tmp/conntrack-overlap.log || true
          cat /tmp/conntrack-overlap.log || true
          EOF

          docker exec -i k8s-139276-deterministic-control-plane bash -s < stress.sh | tee stress-overlap-output.txt

          docker cp k8s-139276-deterministic-control-plane:/tmp/curl-failures.log ./curl-failures.log || true
          docker cp k8s-139276-deterministic-control-plane:/tmp/conntrack-overlap.log ./conntrack-overlap.log || true

      - name: Final state and verdict
        if: always()
        run: |
          mkdir -p artifacts

          kubectl get svc -o wide > artifacts/services.txt || true
          kubectl get endpoints -o wide > artifacts/endpoints.txt || true
          kubectl get pods -o wide > artifacts/pods.txt || true
          kubectl -n kube-system logs -l k8s-app=kube-proxy --tail=800 > artifacts/kube-proxy.log || true

          docker exec k8s-139276-deterministic-control-plane bash -lc '
            set -x
            ipvsadm -Ln || true
            iptables-save | grep -E "KUBE|MASQ|random" || true
            conntrack -L -p tcp 2>/dev/null | grep -E "SYN_SENT|UNREPLIED|sport=3276[8-9]|sport=327[7-9][0-9]|sport=328[0-9][0-9]|sport=329[0-9][0-9]" || true
            sysctl net.ipv4.ip_local_port_range || true
            sysctl net.ipv4.ip_local_reserved_ports || true
            ps aux | grep kube-apiserver | grep service-node-port-range || true
          ' > artifacts/final-node-state.txt 2>&1 || true

          cp *.txt artifacts/ 2>/dev/null || true
          cp *.log artifacts/ 2>/dev/null || true
          cp *.yaml artifacts/ 2>/dev/null || true

          DIRECT_FAILS="$(grep -E "rc=[1-9]" direct-collision-results.txt 2>/dev/null | wc -l || echo 0)"
          STRESS_FAILS="$(wc -l < curl-failures.log 2>/dev/null || echo 0)"
          STRESS_CT="$(wc -l < conntrack-overlap.log 2>/dev/null || echo 0)"
          NODEPORT_COUNT="$(cat nodeport-count.txt 2>/dev/null || echo unknown)"

          {
            echo "# Kubernetes #139276 Deterministic Collision Repro Summary"
            echo
            echo "Configured service-node-port-range: 30000-60999"
            echo "Direct source ports tested: 32770, 32771"
            echo "Stress overlap NodePorts: 32768-32999"
            echo "NodePort count: $NODEPORT_COUNT"
            echo
            echo "Direct collision non-zero curl results: $DIRECT_FAILS"
            echo "Overlap stress curl failures: $STRESS_FAILS"
            echo "Overlap stress relevant conntrack lines: $STRESS_CT"
            echo
            if [ "$DIRECT_FAILS" -gt 0 ] || { [ "$STRESS_FAILS" -gt 0 ] && [ "$STRESS_CT" -gt 0 ]; }; then
              echo "Verdict: POSSIBLY REPRODUCED"
            elif [ "$STRESS_FAILS" -eq 0 ] && [ "$STRESS_CT" -eq 0 ]; then
              echo "Verdict: NOT REPRODUCED"
            else
              echo "Verdict: INCONCLUSIVE"
            fi
          } | tee artifacts/repro-139276-deterministic-summary.md

          kind export logs artifacts/kind-logs --name k8s-139276-deterministic || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k8s-139276-deterministic-runtime-repro-logs
          path: artifacts/

