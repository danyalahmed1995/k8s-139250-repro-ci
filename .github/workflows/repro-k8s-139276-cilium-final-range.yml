name: Reproduce Kubernetes 139276 Cilium Final Range

"on":
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/repro-k8s-139276-cilium-final-range.yml"

jobs:
  repro:
    runs-on: ubuntu-24.04
    timeout-minutes: 100

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: socketlb-enabled-false
            extra_mode: "socketlb_enabled_false"
          - name: extra-config-bpf-lb-sock-false
            extra_mode: "extra_config_bpf_lb_sock_false"
          - name: extra-args-bpf-lb-sock-false
            extra_mode: "extra_args_bpf_lb_sock_false"

    permissions:
      contents: read

    steps:
      - name: Show runner environment
        run: |
          set -euxo pipefail
          uname -a
          docker version

      - name: Install kind kubectl helm
        run: |
          set -euxo pipefail

          curl -Lo kind https://kind.sigs.k8s.io/dl/v0.25.0/kind-linux-amd64
          chmod +x kind
          sudo mv kind /usr/local/bin/kind
          kind version

          curl -LO "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client=true

          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      - name: Create kind cluster with kube-proxy IPVS and expanded NodePort range
        run: |
          set -euxo pipefail

          CLUSTER="k8s-139276-final-${{ matrix.name }}"
          echo "$CLUSTER" > cluster-name.txt

          cat > kind.yaml <<EOF
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          name: $CLUSTER
          networking:
            disableDefaultCNI: true
            kubeProxyMode: "ipvs"
          kubeadmConfigPatches:
            - |
              kind: ClusterConfiguration
              apiServer:
                extraArgs:
                  service-node-port-range: "30000-60999"
          nodes:
            - role: control-plane
          EOF

          kind create cluster --config kind.yaml --image kindest/node:v1.31.0

          kubectl cluster-info
          kubectl get nodes -o wide
          kubectl -n kube-system get pods -o wide || true

      - name: Install Cilium with matching NodePort range and protection disabled
        continue-on-error: true
        run: |
          set -euxo pipefail

          helm repo add cilium https://helm.cilium.io/
          helm repo update

          EXTRA_ARGS=()

          case "${{ matrix.extra_mode }}" in
            socketlb_enabled_false)
              EXTRA_ARGS+=(--set socketLB.enabled=false)
              ;;
            extra_config_bpf_lb_sock_false)
              EXTRA_ARGS+=(--set socketLB.enabled=false)
              EXTRA_ARGS+=(--set-string extraConfig.bpf-lb-sock=false)
              ;;
            extra_args_bpf_lb_sock_false)
              EXTRA_ARGS+=(--set socketLB.enabled=false)
              EXTRA_ARGS+=(--set-string 'extraArgs[0]=--bpf-lb-sock=false')
              ;;
          esac

          helm upgrade --install cilium cilium/cilium \
            --version 1.19.4 \
            --namespace kube-system \
            --set kubeProxyReplacement=true \
            --set nodePort.enabled=true \
            --set-string nodePort.range="30000\,60999" \
            --set nodePort.autoProtectPortRange=false \
            --set nodePort.bindProtection=false \
            --set externalIPs.enabled=true \
            --set hostPort.enabled=true \
            --set ipam.mode=kubernetes \
            --set operator.replicas=1 \
            --set image.pullPolicy=IfNotPresent \
            "${EXTRA_ARGS[@]}"

          kubectl -n kube-system rollout status ds/cilium --timeout=420s
          kubectl -n kube-system rollout status deploy/cilium-operator --timeout=420s
          kubectl -n kube-system rollout status deploy/coredns --timeout=420s

      - name: Install debug tools
        if: always()
        run: |
          set +e
          CLUSTER="$(cat cluster-name.txt)"
          docker exec "$CLUSTER-control-plane" bash -lc '
            apt-get update
            apt-get install -y curl ipvsadm conntrack iptables tcpdump procps iproute2 bpftool
          '

      - name: Validate datapath config before testing
        id: validate
        if: always()
        run: |
          set +e
          mkdir -p artifacts

          echo "variant=${{ matrix.name }}" > artifacts/variant.txt
          echo "extra_mode=${{ matrix.extra_mode }}" >> artifacts/variant.txt

          helm -n kube-system get values cilium > artifacts/cilium-helm-values.txt 2>&1
          kubectl -n kube-system get cm cilium-config -o yaml > artifacts/cilium-configmap.yaml 2>&1
          kubectl -n kube-system get pods -o wide > artifacts/kube-system-pods.txt 2>&1
          kubectl -n kube-system logs ds/cilium --tail=1200 > artifacts/cilium.log 2>&1
          kubectl -n kube-system logs -l k8s-app=kube-proxy --tail=1000 > artifacts/kube-proxy.log 2>&1

          kubectl -n kube-system exec ds/cilium -- cilium status --verbose > artifacts/cilium-status.txt 2>&1
          kubectl -n kube-system exec ds/cilium -- cilium-dbg status --verbose > artifacts/cilium-dbg-status.txt 2>&1
          kubectl -n kube-system exec ds/cilium -- cilium-dbg config --all > artifacts/cilium-dbg-config-all.txt 2>&1
          kubectl -n kube-system exec ds/cilium -- cilium-dbg service list > artifacts/cilium-service-list-before.txt 2>&1
          kubectl -n kube-system exec ds/cilium -- cilium-dbg bpf lb list > artifacts/cilium-bpf-lb-before.txt 2>&1

          CLUSTER="$(cat cluster-name.txt)"
          docker exec "$CLUSTER-control-plane" bash -lc '
            set -x
            ipvsadm -Ln || true
            iptables-save | grep -E "KUBE|CILIUM|MASQ|random" || true
            sysctl net.ipv4.ip_local_port_range || true
            sysctl net.ipv4.ip_local_reserved_ports || true
            bpftool cgroup tree || true
            bpftool prog show || true
            bpftool map show || true
          ' > artifacts/baseline-node-state.txt 2>&1

          NODEPORT_ACTIVE=0
          RANGE_MATCHED=0
          AUTOPROTECT_OFF=0
          BINDPROTECT_OFF=0
          BPF_LB_SOCK_FALSE=0

          if grep -Eiq "NodePort:[[:space:]]+Enabled|NodePort[[:space:]]+Enabled" artifacts/cilium-status.txt artifacts/cilium-dbg-status.txt; then
            NODEPORT_ACTIVE=1
          fi

          if grep -Eiq "Range:[[:space:]]+30000-60999|NodePort:[^\n]*30000-60999|node-port-range.*30000.*60999|nodePort.range.*30000.*60999" artifacts/cilium-status.txt artifacts/cilium-dbg-status.txt artifacts/cilium-configmap.yaml artifacts/cilium-dbg-config-all.txt artifacts/cilium-helm-values.txt; then
            RANGE_MATCHED=1
          fi

          if grep -Eiq "auto-protect-node-port-range[=:][[:space:]]*false|nodePort.autoProtectPortRange: false|autoProtectPortRange: false" artifacts/cilium-configmap.yaml artifacts/cilium-dbg-config-all.txt artifacts/cilium-helm-values.txt; then
            AUTOPROTECT_OFF=1
          fi

          if grep -Eiq "enable-auto-protect-node-port-range[=:][[:space:]]*false|auto-protect-node-port-range[=:][[:space:]]*false|nodePort.autoProtectPortRange: false|autoProtectPortRange: false" artifacts/cilium-configmap.yaml artifacts/cilium-dbg-config-all.txt artifacts/cilium-helm-values.txt; then
            AUTOPROTECT_OFF=1
          fi

          if grep -Eiq "enable-node-port-bind-protection[=:][[:space:]]*false|nodePort.bindProtection: false|bindProtection: false" artifacts/cilium-configmap.yaml artifacts/cilium-dbg-config-all.txt artifacts/cilium-helm-values.txt; then
            BINDPROTECT_OFF=1
          fi

          if grep -Eiq "bpf-lb-sock[=:][[:space:]]*false|socketLB.enabled: false|socketLB:[[:space:]]*$" artifacts/cilium-configmap.yaml artifacts/cilium-dbg-config-all.txt artifacts/cilium-helm-values.txt; then
            BPF_LB_SOCK_FALSE=1
          fi

          {
            echo "# Cilium final-range validation: ${{ matrix.name }}"
            echo
            echo "NodePort active: $NODEPORT_ACTIVE"
            echo "Cilium NodePort range matched 30000-60999: $RANGE_MATCHED"
            echo "nodePort.autoProtectPortRange disabled: $AUTOPROTECT_OFF"
            echo "nodePort.bindProtection disabled: $BINDPROTECT_OFF"
            echo "bpf-lb-sock/socketLB configured false: $BPF_LB_SOCK_FALSE"
            echo
            echo "Status highlights:"
            grep -Ei "KubeProxyReplacement|Socket LB|NodePort|Services|Range" artifacts/cilium-status.txt artifacts/cilium-dbg-status.txt || true
            echo
            echo "Config highlights:"
            grep -Ei "bpf-lb-sock|socketLB|nodePort|node-port|autoProtect|bindProtection|bind-protection|range" artifacts/cilium-configmap.yaml artifacts/cilium-dbg-config-all.txt artifacts/cilium-helm-values.txt || true
            echo
            if [ "$NODEPORT_ACTIVE" -eq 1 ] && [ "$RANGE_MATCHED" -eq 1 ] && [ "$AUTOPROTECT_OFF" -eq 1 ] && [ "$BINDPROTECT_OFF" -eq 1 ] && [ "$BPF_LB_SOCK_FALSE" -eq 1 ]; then
              echo "Config verdict: MATCHED"
            else
              echo "Config verdict: NOT_MATCHED"
            fi
          } | tee artifacts/final-range-validation-summary.md

          # We still run the test if NodePort + range match, even if socket status reports enabled.
          # The final summary separates "strict matched" from "tested with caveat".
          if [ "$NODEPORT_ACTIVE" -eq 1 ] && [ "$RANGE_MATCHED" -eq 1 ]; then
            echo "runnable=true" >> "$GITHUB_OUTPUT"
          else
            echo "runnable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy backend and overlap NodePorts
        if: steps.validate.outputs.runnable == 'true'
        run: |
          set -euxo pipefail

          cat > app.yaml <<'EOF'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: k8s-139276-echo
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: k8s-139276-echo
            template:
              metadata:
                labels:
                  app: k8s-139276-echo
              spec:
                containers:
                  - name: agnhost
                    image: registry.k8s.io/e2e-test-images/agnhost:2.53
                    args: ["netexec", "--http-port=9397"]
                    ports:
                      - containerPort: 9397
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: k8s-139276-clusterip
          spec:
            type: ClusterIP
            selector:
              app: k8s-139276-echo
            ports:
              - name: http
                port: 9397
                targetPort: 9397
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: np-direct-32770
          spec:
            type: NodePort
            selector:
              app: k8s-139276-echo
            ports:
              - name: p32770
                port: 32770
                targetPort: 9397
                nodePort: 32770
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: np-direct-32771
          spec:
            type: NodePort
            selector:
              app: k8s-139276-echo
            ports:
              - name: p32771
                port: 32771
                targetPort: 9397
                nodePort: 32771
          EOF

          kubectl apply -f app.yaml
          kubectl rollout status deploy/k8s-139276-echo --timeout=180s

          cat > overlap-nodeports.yaml <<'EOF'
          EOF

          for p in $(seq 32768 32999); do
            if [ "$p" = "32770" ] || [ "$p" = "32771" ]; then
              continue
            fi

            cat >> overlap-nodeports.yaml <<EOF
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: np-overlap-$p
          spec:
            type: NodePort
            selector:
              app: k8s-139276-echo
            ports:
              - name: p$p
                port: $p
                targetPort: 9397
                nodePort: $p
          EOF
          done

          kubectl apply -f overlap-nodeports.yaml

          CLUSTER_IP="$(kubectl get svc k8s-139276-clusterip -o jsonpath='{.spec.clusterIP}')"
          echo "$CLUSTER_IP" | tee cluster-ip.txt

          kubectl get pods -o wide | tee pods.txt
          kubectl get svc -o wide | tee services.txt
          kubectl get svc | grep NodePort | wc -l | tee nodeport-count.txt

          kubectl -n kube-system exec ds/cilium -- cilium-dbg service list > cilium-service-list-after.txt 2>&1 || true
          kubectl -n kube-system exec ds/cilium -- cilium-dbg bpf lb list > cilium-bpf-lb-after.txt 2>&1 || true

          CLUSTER="$(cat cluster-name.txt)"
          docker exec "$CLUSTER-control-plane" bash -lc "curl -v --max-time 5 http://$CLUSTER_IP:9397/hostname"
          docker exec "$CLUSTER-control-plane" bash -lc "ipvsadm -Ln" | tee ipvs-after-services.txt
          docker exec "$CLUSTER-control-plane" bash -lc "sysctl net.ipv4.ip_local_port_range; sysctl net.ipv4.ip_local_reserved_ports || true" | tee node-sysctls-before-stress.txt

      - name: Direct local source-port collision tests
        if: steps.validate.outputs.runnable == 'true'
        run: |
          set -euxo pipefail

          CLUSTER_IP="$(cat cluster-ip.txt)"
          CLUSTER="$(cat cluster-name.txt)"

          run_curl() {
            label="$1"
            port="$2"

            echo "=== $label local-port=$port ===" | tee -a direct-collision-results.txt

            set +e
            docker exec "$CLUSTER-control-plane" bash -lc "curl -sS --local-port $port --connect-timeout 3 --max-time 6 http://$CLUSTER_IP:9397/hostname" \
              > "curl-$label.out" 2> "curl-$label.err"
            rc=$?
            set -e

            echo "rc=$rc" | tee -a direct-collision-results.txt
            echo "stdout:" | tee -a direct-collision-results.txt
            cat "curl-$label.out" | tee -a direct-collision-results.txt || true
            echo "stderr:" | tee -a direct-collision-results.txt
            cat "curl-$label.err" | tee -a direct-collision-results.txt || true

            docker exec "$CLUSTER-control-plane" bash -lc "conntrack -L -p tcp 2>/dev/null | grep -E 'SYN_SENT|UNREPLIED|sport=$port|dport=$port' || true" \
              | tee -a direct-collision-conntrack.txt

            sleep 3
          }

          run_curl "nodeport-exists-32770" "32770"
          run_curl "nodeport-exists-32771" "32771"
          run_curl "control-no-nodeport-33000" "33000"

          kubectl delete svc np-direct-32771
          sleep 5
          run_curl "nodeport-deleted-32771" "32771"

          kubectl apply -f app.yaml
          sleep 5
          run_curl "nodeport-recreated-32771" "32771"

      - name: Forced ephemeral overlap stress
        if: steps.validate.outputs.runnable == 'true'
        run: |
          set -euxo pipefail

          CLUSTER_IP="$(cat cluster-ip.txt)"
          CLUSTER="$(cat cluster-name.txt)"

          cat > stress.sh <<'EOF'
          #!/usr/bin/env bash
          set -u

          URL="http://__CLUSTER_IP__:9397/hostname"

          sysctl -w net.ipv4.ip_local_port_range="32768 60999"
          sysctl -w net.ipv4.ip_local_reserved_ports=""

          sysctl net.ipv4.ip_local_port_range
          sysctl net.ipv4.ip_local_reserved_ports || true

          rm -f /tmp/curl-failures.log /tmp/curl-error-samples.log /tmp/conntrack-overlap.log
          touch /tmp/curl-failures.log /tmp/curl-error-samples.log /tmp/conntrack-overlap.log

          echo "URL=$URL"
          date

          seq 1 100000 | xargs -n1 -P300 -I{} bash -c '
            iter="$1"
            url="$2"
            err="/tmp/curl-error-$iter.log"

            if ! curl -sS --connect-timeout 1 --max-time 2 "$url" >/dev/null 2>"$err"; then
              echo "curl failed iteration=$iter" >> /tmp/curl-failures.log

              sample_count="$(grep -c "^--- iteration=" /tmp/curl-error-samples.log 2>/dev/null || echo 0)"
              if [ "$sample_count" -lt 100 ]; then
                {
                  echo "--- iteration=$iter ---"
                  cat "$err"
                } >> /tmp/curl-error-samples.log
              fi
            fi

            rm -f "$err"
          ' _ {} "$URL" || true

          date
          echo "failure count:"
          wc -l /tmp/curl-failures.log 2>/dev/null || true

          echo "curl error samples:"
          cat /tmp/curl-error-samples.log || true

          conntrack -L -p tcp 2>/dev/null | grep -E "SYN_SENT|UNREPLIED|sport=3276[8-9]|sport=327[7-9][0-9]|sport=328[0-9][0-9]|sport=329[0-9][0-9]" > /tmp/conntrack-overlap.log || true

          echo "relevant conntrack:"
          cat /tmp/conntrack-overlap.log || true
          EOF

          sed -i "s|__CLUSTER_IP__|$CLUSTER_IP|g" stress.sh

          docker exec -i "$CLUSTER-control-plane" bash -s < stress.sh | tee stress-overlap-output.txt

          docker cp "$CLUSTER-control-plane":/tmp/curl-failures.log ./curl-failures.log || true
          docker cp "$CLUSTER-control-plane":/tmp/curl-error-samples.log ./curl-error-samples.log || true
          docker cp "$CLUSTER-control-plane":/tmp/conntrack-overlap.log ./conntrack-overlap.log || true

      - name: Reserved-port mitigation control
        if: steps.validate.outputs.runnable == 'true'
        run: |
          set -euxo pipefail

          CLUSTER_IP="$(cat cluster-ip.txt)"
          CLUSTER="$(cat cluster-name.txt)"

          cat > reserved.sh <<'EOF'
          #!/usr/bin/env bash
          set -u

          URL="http://__CLUSTER_IP__:9397/hostname"

          sysctl -w net.ipv4.ip_local_port_range="32768 60999"
          sysctl -w net.ipv4.ip_local_reserved_ports="32768-32999"

          sysctl net.ipv4.ip_local_port_range
          sysctl net.ipv4.ip_local_reserved_ports || true

          rm -f /tmp/curl-failures-reserved.log /tmp/curl-error-samples-reserved.log /tmp/conntrack-reserved.log
          touch /tmp/curl-failures-reserved.log /tmp/curl-error-samples-reserved.log /tmp/conntrack-reserved.log

          date

          seq 1 30000 | xargs -n1 -P200 -I{} bash -c '
            iter="$1"
            url="$2"
            err="/tmp/curl-error-reserved-$iter.log"

            if ! curl -sS --connect-timeout 1 --max-time 2 "$url" >/dev/null 2>"$err"; then
              echo "curl failed iteration=$iter" >> /tmp/curl-failures-reserved.log

              sample_count="$(grep -c "^--- iteration=" /tmp/curl-error-samples-reserved.log 2>/dev/null || echo 0)"
              if [ "$sample_count" -lt 50 ]; then
                {
                  echo "--- iteration=$iter ---"
                  cat "$err"
                } >> /tmp/curl-error-samples-reserved.log
              fi
            fi

            rm -f "$err"
          ' _ {} "$URL" || true

          date
          echo "reserved failure count:"
          wc -l /tmp/curl-failures-reserved.log 2>/dev/null || true

          echo "reserved curl error samples:"
          cat /tmp/curl-error-samples-reserved.log || true

          conntrack -L -p tcp 2>/dev/null | grep -E "SYN_SENT|UNREPLIED|sport=3276[8-9]|sport=327[7-9][0-9]|sport=328[0-9][0-9]|sport=329[0-9][0-9]" > /tmp/conntrack-reserved.log || true

          echo "reserved relevant conntrack:"
          cat /tmp/conntrack-reserved.log || true
          EOF

          sed -i "s|__CLUSTER_IP__|$CLUSTER_IP|g" reserved.sh

          docker exec -i "$CLUSTER-control-plane" bash -s < reserved.sh | tee reserved-control-output.txt

          docker cp "$CLUSTER-control-plane":/tmp/curl-failures-reserved.log ./curl-failures-reserved.log || true
          docker cp "$CLUSTER-control-plane":/tmp/curl-error-samples-reserved.log ./curl-error-samples-reserved.log || true
          docker cp "$CLUSTER-control-plane":/tmp/conntrack-reserved.log ./conntrack-reserved.log || true

      - name: Final summary
        if: always()
        run: |
          set +e
          mkdir -p artifacts

          kubectl get nodes -o wide > artifacts/nodes.txt 2>&1 || true
          kubectl get svc -o wide > artifacts/services.txt 2>&1 || true
          kubectl get endpoints -o wide > artifacts/endpoints.txt 2>&1 || true
          kubectl get pods -o wide > artifacts/pods.txt 2>&1 || true
          kubectl -n kube-system get pods -o wide > artifacts/kube-system-pods.txt 2>&1 || true
          kubectl -n kube-system logs ds/cilium --tail=1200 > artifacts/cilium-final.log 2>&1 || true
          kubectl -n kube-system logs -l k8s-app=kube-proxy --tail=1200 > artifacts/kube-proxy-final.log 2>&1 || true
          kubectl -n kube-system exec ds/cilium -- cilium status --verbose > artifacts/cilium-status-final.txt 2>&1 || true
          kubectl -n kube-system exec ds/cilium -- cilium-dbg status --verbose > artifacts/cilium-dbg-status-final.txt 2>&1 || true
          kubectl -n kube-system exec ds/cilium -- cilium-dbg service list > artifacts/cilium-service-list-final.txt 2>&1 || true
          kubectl -n kube-system exec ds/cilium -- cilium-dbg bpf lb list > artifacts/cilium-bpf-lb-final.txt 2>&1 || true
          kubectl -n kube-system exec ds/cilium -- cilium-dbg bpf ct list global > artifacts/cilium-bpf-ct-global-final.txt 2>&1 || true

          CLUSTER="$(cat cluster-name.txt 2>/dev/null || true)"
          if [ -n "$CLUSTER" ]; then
            docker exec "$CLUSTER-control-plane" bash -lc '
              set -x
              ipvsadm -Ln || true
              iptables-save | grep -E "KUBE|CILIUM|MASQ|random" || true
              conntrack -L -p tcp 2>/dev/null | grep -E "SYN_SENT|UNREPLIED|sport=3276[8-9]|sport=327[7-9][0-9]|sport=328[0-9][0-9]|sport=329[0-9][0-9]" || true
              sysctl net.ipv4.ip_local_port_range || true
              sysctl net.ipv4.ip_local_reserved_ports || true
              bpftool cgroup tree || true
              bpftool prog show || true
              bpftool map show || true
            ' > artifacts/final-node-state.txt 2>&1 || true

            kind export logs artifacts/kind-logs --name "$CLUSTER" || true
          fi

          cp *.txt artifacts/ 2>/dev/null || true
          cp *.log artifacts/ 2>/dev/null || true
          cp *.yaml artifacts/ 2>/dev/null || true

          VALIDATION="$(grep -h "Config verdict:" artifacts/final-range-validation-summary.md 2>/dev/null | tail -1 | awk '{print $3}')"
          RUNNABLE="false"
          if grep -q "NodePort active: 1" artifacts/final-range-validation-summary.md 2>/dev/null && grep -q "Cilium NodePort range matched 30000-60999: 1" artifacts/final-range-validation-summary.md 2>/dev/null; then
            RUNNABLE="true"
          fi

          DIRECT_FAILS="$(grep -E "rc=[1-9]" direct-collision-results.txt 2>/dev/null | wc -l || echo 0)"
          STRESS_FAILS="$(wc -l < curl-failures.log 2>/dev/null || echo 0)"
          STRESS_CT="$(wc -l < conntrack-overlap.log 2>/dev/null || echo 0)"
          RESERVED_FAILS="$(wc -l < curl-failures-reserved.log 2>/dev/null || echo 0)"
          RESERVED_CT="$(wc -l < conntrack-reserved.log 2>/dev/null || echo 0)"
          NODEPORT_COUNT="$(cat nodeport-count.txt 2>/dev/null || echo unknown)"

          {
            echo "# Kubernetes #139276 Cilium final-range result"
            echo
            echo "Variant: ${{ matrix.name }}"
            echo "Extra mode: ${{ matrix.extra_mode }}"
            echo
            cat artifacts/final-range-validation-summary.md 2>/dev/null || true
            echo
            echo "Runnable config: $RUNNABLE"
            echo "Strict config verdict: ${VALIDATION:-unknown}"
            echo "NodePort count: $NODEPORT_COUNT"
            echo
            echo "Direct collision non-zero curl results: $DIRECT_FAILS"
            echo "Forced overlap stress curl failures: $STRESS_FAILS"
            echo "Forced overlap relevant conntrack lines: $STRESS_CT"
            echo "Reserved-control curl failures: $RESERVED_FAILS"
            echo "Reserved-control relevant conntrack lines: $RESERVED_CT"
            echo
            if [ "$RUNNABLE" != "true" ]; then
              echo "Final verdict: CONFIG_NOT_MATCHED"
            elif [ "$STRESS_FAILS" -gt 0 ] && [ "$STRESS_CT" -gt 0 ]; then
              echo "Final verdict: POSSIBLY_REPRODUCED"
            elif [ "$STRESS_FAILS" -gt 0 ]; then
              echo "Final verdict: INCONCLUSIVE_CLIENT_OR_DATAPATH_FAILURES"
            else
              echo "Final verdict: NOT_REPRODUCED"
            fi
          } | tee artifacts/final-summary.md

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
